page_heading: Güvenilir İş Ortağınız
intro_paragraph_1: Yapı malzemeleri konusunda <strong class="text-gray-900">Emak
  Yapı Malzemeleri Ltd. Şti.</strong> olarak yurt içindeki inşaat projelerine
  toptan ürün tedariği sağlamaktayız. Ankara'da <strong
  class="text-gray-900">Kazan ve Ostim</strong>'deki satış ve depo
  noktalarımızla müşterilerimize sürekli stok, hızlı ve güvenilir ürün
  sevkiyatıyla hizmet vermekteyiz.
intro_paragraph_2: Geniş ürün yelpazemiz, hızlı sevkiyat ağımız ve uzman
  ekibimiz ile projelerinizin güvenilir çözüm ortağıyız. İnşaat projelerinizin
  her aşamasında ihtiyaç duyduğunuz kaliteli malzemeleri tek çatı altında
  bulabilir, zamanında teslimat garantisi ile projelerinizin aksamaması için
  yanınızdayız.
key_points:
  - icon: MapPin
    title: Stratejik Konum
    description: Ankara Ulus ve Ostim'deki iki lojistik noktamız ile hızlı hazırlık
      ve teslimat.
  - icon: Package
    title: Geniş Ürün Yelpazesi
    description: Toptan ürün tedariği için geniş katalog ve sürekli stok garantisi.
  - icon: Truck
    title: Hızlı Sevkiyat
    description: Projelerinizin zamanında tamamlanması için güvenilir sevkiyat altyapısı.
