vision_heading: Vizyonumuz
vision_text: İnşaat sektöründe kalitenin başarı için şart olduğunu bilen, ahlaki
  sorumluluklarının bilincinde sektörün öncü firmaları arasında lider olmak.
values_heading: Değerlerimiz
values:
  - Müşterilerimize kusursuz hizmet sunmak
  - İş ahlakına bağlılık, etik değerler ve şeffaflık
  - Uluslararası standartlara uygun kalite bilinci
  - Beklentinin ötesinde katma değerli iş birliği
