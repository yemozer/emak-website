heading: Depo ve Sevkiyat Merkezlerimiz
paragraph_1: Ankara'da <strong class="text-[rgb(39,45,122)]">Kazan ve
  Ostim</strong>'deki satış ve depo noktalarımızla müşterilerimize sürekli stok,
  hızlı ve güvenilir ürün sevkiyatıyla hizmet vermekteyiz.
paragraph_2: Geniş ürün yelpazemiz, hızlı sevkiyat ağımız ve uzman ekibimiz ile
  projelerinizin güvenilir çözüm ortağıyız.
