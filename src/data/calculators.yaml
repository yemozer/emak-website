# Hesap Tabloları Konfigürasyon Dosyası
# Bu dosyayı düzenleyerek hesaplayıcıları, formülleri ve katsayıları değiştirebilirsiniz.
# 
# DÜZENLEME İÇİN:
# 1. GitHub'da bu dosyaya gidin: https://github.com/[repo]/emakyapi-website/src/data/calculators.yaml
# 2. Sağ üstteki "Edit" (Düzenle) butonuna tıklayın
# 3. Değişikliklerinizi yapın
# 4. Sayfanın altındaki "Commit changes" (Değişiklikleri kaydet) butonuna tıklayın
# 5. Cloudflare otomatik olarak yeni versiyonu yayınlayacak (1-2 dakika sürer)
#
# FORMÜL YAZMA:
# - Girdiler: metrekare, kalinlik, vb. (Türkçe değişken isimleri)
# - Matematik işlemler: +, -, *, /, ()
# - Örnek: "metrekare * 4" = metrekare çarpı 4
# - Örnek: "metrekare * kalinlik / 100" = metrekare çarpı kalınlık bölü 100
# - Yuvarlama: Math.ceil(...) = yukarı yuvarla, Math.max(1, ...) = en az 1

hesaplayicilar:
  # ============================================
  # MANTOLAMA SİSTEMİ HESAPLAYICISI
  # ============================================
  - kimlik: mantolama
    baslik: Mantolama Sistemleri
    alt_baslik: Mantolama Sistemi
    aciklama: Metrekare alanı ve foamboard kalınlığını girerek mantolama sistemi için ihtiyaç duyulan malzemeleri hesaplayın.
    
    # Girdi alanları (kullanıcının dolduracağı)
    girdiler:
      - anahtar: metrekare
        etiket: Metrekare (m²)
        birim: m²
        minimum: 0
        adim: 0.1
        ornek: "Metrekare giriniz"
        varsayilan: 10
        
      - anahtar: kalinlik
        etiket: Foamboard Kalınlığı*
        birim: cm
        minimum: 0
        adim: 0.5
        ornek: "Örn: 3"
        varsayilan: 3
    
    # Hesaplanacak malzemeler ve formülleri
    malzemeler:
      - anahtar: foamboard
        etiket: Foamboard Miktarı
        birim: m³
        formul: "metrekare * kalinlik / 100"
        # Açıklama: Metrekare × Kalınlık(cm) / 100 = Hacim(m³)
        
      - anahtar: yapistirma_harci
        etiket: Isı Levha Yapıştırma Harcı
        birim: kg
        formul: "metrekare * 4"
        # Katsayı: 4 kg/m²
        
      - anahtar: siva_harci
        etiket: Isı Levha Sıva Harcı
        birim: kg
        formul: "metrekare * 5"
        # Katsayı: 5 kg/m²
        
      - anahtar: dekoratif_siva
        etiket: Dekoratif Mineral Sıva
        birim: kg
        formul: "metrekare * 3"
        # Katsayı: 3 kg/m²
        
      - anahtar: siva_filesi
        etiket: Sıva Filesi (160 gr/m²)
        birim: Adet
        formul: "Math.max(1, Math.ceil(metrekare * 11 / 10))"
        # Katsayı: 1.1 adet/m² (yukarı yuvarlanır, en az 1)
        
      - anahtar: mantolama_dubeli
        etiket: Mantolama Dübeli
        birim: Adet
        formul: "metrekare * 6"
        # Katsayı: 6 adet/m²
        
      - anahtar: kose_profili
        etiket: PVC Fileli Köşe Profili (2,5 mt)
        birim: Adet
        formul: "Math.max(1, Math.ceil(metrekare * 0.1))"
        # Katsayı: 0.1 adet/m² (yukarı yuvarlanır, en az 1)
    
    # Alt bilgi notları
    notlar:
      - Alçı Levha Köşe Profili projeye göre belirlenir.
      - "* DC Profil aks aralıkları 60 cm olarak belirlenmiştir."
      - "** Dübel-Vida her 60 cm.'de bir montaja göre belirlenmiştir."
      - "» Tek İskeletli Tek Kat Alçı Levha Bölme Duvar Sistemi Metraj Analizi 2,50 m yükseklikte ve 1 m² alan için %5 malzeme firesi düşünülerek hazırlanmıştır."
      - "» Metraj hesaplaması proje koşullarına göre değişiklik gösterebilir; proje bazında danışmanlık almanızı öneririz."

  # ============================================
  # MODÜLER ASMA TAVAN SİSTEMİ HESAPLAYICISI
  # ============================================
  - kimlik: modular_asma_tavan
    baslik: Modüler Asma Tavan Sistemleri
    alt_baslik: Modüler Asma Tavan Sistemi
    aciklama: Toplam metrajı girin, modüler asma tavan sistemi için sarfiyatı görün.
    
    girdiler:
      - anahtar: metrekare
        etiket: Metrekare (m²)
        birim: m²
        minimum: 0
        adim: 0.1
        ornek: "Metrekare giriniz"
        varsayilan: 10
    
    malzemeler:
      - anahtar: levha_60x60
        etiket: 60 x 60 Levha
        birim: m²
        formul: "metrekare * 2.77"
      
      - anahtar: t24_ana
        etiket: T24 Ana Taşıyıcı (L=3,60 m)
        birim: m
        formul: "metrekare * 0.24"
      
      - anahtar: t24_uzun
        etiket: T24 Uzun Tali Taşıyıcı (L=1,20 m)
        birim: m
        formul: "metrekare * 1.39" # 10 m² için ~13.9 m
      
      - anahtar: t24_kisa
        etiket: T24 Kısa Tali Taşıyıcı (L=0,60 m)
        birim: m
        formul: "metrekare * 1.38"
      
      - anahtar: l_kosebent
        etiket: L Köşebent (L=3,00 m)
        birim: m
        formul: "metrekare * 3.7" # 10 m² için ~37 m
      
      - anahtar: celik_dubel
        etiket: Çelik Dübel
        birim: Adet
        formul: "metrekare * 0.7" # 10 m² için ~7 adet
      
      - anahtar: aski_teli
        etiket: Askı Teli
        birim: Adet
        formul: "metrekare * 0.7" # 10 m² için ~7 adet
      
      - anahtar: ciftyay
        etiket: Çiftli Yay
        birim: Adet
        formul: "metrekare * 0.7" # 10 m² için ~7 adet
      
      - anahtar: pul_baslikli_dubel
        etiket: Pul Başlıklı Dübel *
        birim: Adet
        formul: "Math.max(1, Math.ceil(metrekare * 2.1))" # 10 m² için ~21 adet
    
    notlar:
      - ""
      - "* Pul Başlıklı Dübel her 60 cm.’de bir montaja göre belirlenmiştir."
      - "» Modüler Asma Tavan Sistemi Metraj Analizi 1 m² alan için hazırlanmıştır."
      - "» Metraj hesaplaması proje koşullarına göre değişiklik arz edeceğinden, ustalarımıza proje bazında danışmanızı tavsiye ederiz."
      - "» Kullanılan malzemeler hakkında lütfen danışınız."

